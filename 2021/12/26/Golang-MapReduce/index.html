/span><br><span class="line">	<span class="string">"log"</span></span><br><span class="line">	<span class="string">"net/rpc"</span></span><br><span class="line">	<span class="string">"os"</span></span><br><span class="line">	<span class="string">"strings"</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// Map functions return a slice of KeyValue.</span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="keyword">type</span> KeyValue <span class="keyword">struct</span> &#123;</span><br><span class="line">	Key   <span class="keyword">string</span></span><br><span class="line">	Value <span class="keyword">string</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// use ihash(key) % NReduce to choose the reduce</span></span><br><span class="line"><span class="comment">// Task number for each KeyValue emitted by Map.</span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">ihash</span><span class="params">(key <span class="keyword">string</span>)</span> <span class="title">int</span></span> &#123;</span><br><span class="line">	h := fnv.New32a()</span><br><span class="line">	h.Write([]<span class="keyword">byte</span>(key))</span><br><span class="line">	<span class="keyword">return</span> <span class="keyword">int</span>(h.Sum32() &amp; <span class="number">0x7fffffff</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">Worker</span><span class="params">(mapf <span class="keyword">func</span>(<span class="keyword">string / if reqTask conn fail, worker exit</span></span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		t := w.reqTask()</span><br><span class="line">		<span class="keyword">if</span> !t.Alive &#123;</span><br><span class="line">			DPrintf(<span class="string">"worker get task not alive, exit"</span>)</span><br><span class="line">			<span class="keyword">return</span></span><br><span class="line">		&#125;</span><br><span class="line">		w.doTask(t)</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(w *worker)</span> <span class="title">reqTask</span><span class="params">()</span> <span class="title">Task</span></span> &#123;</span><br><span class="line">	args := TaskArgs&#123;&#125;</span><br><span class="line">	args.WorkerId = w.id</span><br><span class="line">	reply := TaskReply&#123;&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> ok := call(<span class="string">"Master.GetOneTask"</span>, &amp;args, &amp;reply); !ok &#123;</span><br><span class="line">		DPrintf(<span class="string">"worker get task fail,exit"</span>)</span><br><span class="line">		os.Exit(<span class="number">1</span>)</span><br><span class="line">	&#125;</span><br><span class="line">	DPrintf(<span class="string">"worker get task:%+v"</span>, reply.Task)</span><br><span class="line">	<span class="keyword">return</span> *reply.Task</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(w *worker)</span> <span class="title">doTask</span><span class="params">(t Task)</span></span> &#123;</span><br><span class="line">	DPrintf(<span class="string">"in do Task"</span>)</span><br><span class="line"></span><br><span class="line">	<span class= <br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(m *Master)</span> <span class="title">getTask</span><span class="params">(taskSeq <span class="keyword">int</span>)</span> <span class="title">Task</span></span> &#123;</span><br><span class="line">	task := Task&#123;</span><br><span class="line">		FileName: <span class="string">""</span>,</span><br><span class="line">		NReduce:  m.nReduce,</span><br><span class="line">		NMaps:    <span class="built_in">len</span>(m.files),</span><br><span class="line">		Seq:      taskSeq,</span><br><span class="line">		Phase:    m.taskPhase,</span><br><span class="line">		Alive:    <span class="literal">true</span>,</span><br><span class="line">	&#125;</span><br><span class="line">	DPrintf(<span class="string">"m:%+v, taskseq:%d, lenfiles:%d, lents:%d"</span>, m, taskSeq, <span class="built_in">len</span>(m.files), <span class="built_in">len</span>(m.taskStats))</span><br><span class="line">	<span class="keyword">if</span> task.Phase == MapPhase &#123;</span><br><span class="line">		task.FileName = m.files[taskSeq]</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> task</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 调度任务</span></span><br><span class="line"><span class="comment">// 根据任务的状态，将任务放进 channel 中</span></span><br><span class="line"><span class="comment">// Worker 发送 RPC 请求从 channel 中获取任务</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(m *Master)</span> <span class="title">schedule</span><span class="params">()</span></span> &#123;</span><br><span class="line">	m.mu.Lock()</span><br><span class="line">	<span class="keyword">defer</span> m.mu.Unlock()</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> m.done &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	allFinish := <span class="literal">true</span></span><br><span class="line">	<span class="keyword">for</span> index, t := <span class="keyword">range</span> m.taskStats &#123;</span><br><span class="line">		<span class="keyword">switch</span> t.Status &#123;</span><br><span class="line">		<span class="keyword">case</span> TaskStatusReady:</span><br><span class="line">			allFinish = <span class="literal">false</span></span><br><span class="line">			m.taskCh &lt;- m.getTask(index)</span><br><span class="line">			m.taskStats[index].Status = TaskStatusQueue</span><br><span class="line">		<span class="keyword">case</span> TaskStatusQueue:</span><br><span class="line">			allFinish = <span class="literal">false</span></span><br><span class="line">		<span class="keyword">case</span> TaskStatusRunning:</span><br><span class="line">			allFinish = <span class="literal">false</span></span><br><span class="line">			<span class="keyword">if</span> time.Now().Sub(t.StartTime) &gt; MaxTaskRunTime &#123;</span><br><span class="line">				m.taskStats[index].Status = TaskStatusQueue</span><br><span class="line">				m.taskCh &lt;- m.getTask(index)</span><br><span class="line">			&#125;</span><br><span class="line">		<span class="keyword">case</span> TaskStatusFinish:</span><br><span class="line">		<span class="keyword">case</span> TaskStatusErr:</span><br><span class="line">			allFinish = <span class="literal">false</span></span><br><span class="line">			m.taskStats[index].Status = TaskStatusQueue</span><br><span class="line">			m.taskCh &lt;- m.getTask(index)</span><br><span class="line">		<span class="keyword">default</span>:</span><br><span class="line">			<span class="built_in">panic</span>(<span class="string">"t.status err"</span>)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">if</span> allFinish &#12 k phase neq"</span>)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	m.taskStats[task.Seq].Status = TaskStatusRunning</span><br><span class="line">	m.taskStats[task.Seq].WorkerId = args.WorkerId</span><br><span class="line">	m.taskStats[task.Seq].StartTime = time.Now()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// Your code here -- RPC handlers for the worker to call.</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(m *Master)</span> <span class="title">GetOneTask</span><span class="params">(args *TaskArgs, reply *TaskReply)</span> <span class="title">error</span></span> &#123;</span><br><span class="line">	task := &lt;-m.taskCh</span><br><span class="line">	reply.Task = &amp;task</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> task.Alive &#123;</span><br><span class="line">		m.regTask(args, &amp;task)</span><br><span class="line">	&#125;</span><br><span class="line">	DPrintf(<span class="string">"in get one Task, args:%+v, reply:%+v"</span>, args, reply)</span><br><span class="line">	<span class="keyword">return</span> <span class="literal">nil</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(m *Master)</span> <span class="title">ReportTask</span><span class="params">(args *ReportTaskArgs, reply *ReportTaskReply)</span> <span class="title">error</span></span> &#123;</span><br><span class="line">	m.mu.Lock()</span><br><span class="line">	<span class="keyword">defer</span> m.mu.Unlock()</span><br><span class="line"></span><br><span class="line">	DPrintf(<span class="string">"get report task: %+v, taskPhase: %+v"</span>, args, m.taskPhase)</span><br><span class="line"></span><br><span class="line">	<span class
