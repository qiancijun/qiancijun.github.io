an><br><span class="line">                    triangle[i][j] += triangle[i - <span class="number">1</span>][j];</span><br><span class="line">                &#125; </span><br><span class="line">                <span class="keyword">else</span> <span class="keyword">if</span> (j == triangle[i].size() - <span class="number">1</span>) &#123;</span><br><span class="line">                    triangle[i][j] += triangle[i - <span class="number">1</span>][triangle[i - <span class="number">1</span>].size() - <span class="number">1</span>];</span><br><span class="line">                &#125;</span><br><span class="line">                 <span class="keyword">else</span> &#123;</span><br><span class="line">                    triangle[i][j] = min(triangle[i][j] + triangle[i - <span class="number">1</span>][j - <span class="number">1</span>], triangle[i][j] + triangle[i - <span class="number">1</span>][j]);</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; triangle[m - <span class="number">1</span>].size(); i++) &#123;</span><br><span class="line">            result = min(result, triangle[m - <span class="number">1</span>][i]);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> result;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
