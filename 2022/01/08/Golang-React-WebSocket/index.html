        <div class="content markdown">
            <p>本案例仅为一个演示Demo，Web端连接后端，向后端发送程序，后端读取完再回写给Web端。</p>
<h1>Golang</h1>
<p>在Golang官网提供的包有对应的WebSocket库可以使用，但是提供的API粒度太小，本Demo使用<code>gorilla/websocket</code>，一个封装较为完整的库</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">"github.com/gin-gonic/gin"</span></span><br><span class="line">	<span class="string">"github.com/gorilla/websocket"</span></span><br><span class="line">	<span class="string">"log"</span></span><br><span class="line">	<span class="string">"net/http"</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> upgrade = websocket.Upgrader&#123;</span><br><span class="line">	ReadBufferSize:  <span class="number">1024</span>,</span><br><span class="line">	WriteBufferSize: <span class="number">1024</span>,</span><br><span class="line">	<span class="comment">// 解决跨域问题</span></span><br><span class="line">	CheckOrigin: <span class="function"><span class="keyword">func</span><span class="params">(r *http.Request)</span> <span class="title">bool</span></span> &#123;</span><br><span class="line">		<span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">	&#125;,</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">InitRouter</span><span class="params">()</span></span> &#123;</span><br><span class="line">	r := gin.Default()</span><br><span class="line">	r.GET(<span class="string">"/websocket"</span>, WebSocket)</span><br><span class="line">	r.Run(<span class="string">":8282"</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">WebSocket</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">	conn, err := upgrade.Upgrade(c.Writer, c.Request, <span class="literal">nil</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		c.Writer.WriteString(err.Error())</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">defer</span> conn.Close()</span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		mt, message, err := conn.ReadMessage()</span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			log.Println(<span class="string">"read:"</span>, err)</span><br><span class="line">			<span class="keyword">break</span></span><br><span class="line">		&#125;</span><br><span class="line">		log.Printf(<span class="string">"recv: %s"</span>, message)</span><br><span class="line">		err = conn.WriteMessage(mt, message)</span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			log.Println(<span class="string">"write:"</span>, err)</span><br><span class="line">			<span class="keyword">break</span></span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<h1>React</h1>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line">import React, &#123; Component &#125; from &#39;react&#39;</span><br><span class="line"></span><br><span class="line">interface Props &#123;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line">interface State &#123;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">export default class App extends Component&lt;Props, State&gt; &#123;</span><br><span class="line">  state &#x3D; &#123;&#125;</span><br><span class="line"></span><br><span class="line">  btnRef &#x3D; React.createRef&lt;HTMLInputElement&gt;();</span><br><span class="line">  msgRef &#x3D; React.createRef&lt;HTMLInputElement&gt;();</span><br><span class="line"></span><br><span class="line">  private ws: WebSocket | null &#x3D; null;</span><br><span class="line"></span><br><span class="line">  onSendMsg &#x3D; () &#x3D;&gt; &#123;</span><br><span class="line">    this.ws!.send(this.msgRef.current!.value);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  onConnect &#x3D; () &#x3D;&gt; &#123;</span><br><span class="line">    if (this.ws &#x3D;&#x3D; null) &#123;</span><br><span class="line">      this.ws &#x3D; new WebSocket(&quot;ws:&#x2F;&#x2F;localhost:8282&#x2F;websocket&quot;);</span><br><span class="line">      this.ws.onopen &#x3D; () &#x3D;&gt; &#123;</span><br><span class="line">        this.ws!.send(&quot;hello&quot;);</span><br><span class="line">        console.log(&quot;连接成功&quot;);</span><br><span class="line">      &#125;</span><br><span class="line">      this.ws.onclose &#x3D; () &#x3D;&gt; &#123;</span><br><span class="line">        console.log(&quot;连接断开&quot;);</span><br><span class="line">      &#125;</span><br><span class="line">      this.ws.onerror &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        console.log(e);</span><br><span class="line">      &#125;</span><br><span class="line">      this.ws.onmessage &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        console.log(&#39;服务器发来的消息:&#39; + e.data);</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  render() &#123;</span><br><span class="line">    return (</span><br><span class="line">      &lt;div className&#x3D;&quot;App&quot;&gt;</span><br><span class="line">        &lt;input type&#x3D;&quot;button&quot; value&#x3D;&quot;连接&quot; ref&#x3D;&#123;this.btnRef&#125; onClick&#x3D;&#123;this.onConnect&#125; &#x2F;&gt;</span><br><span class="line">        &lt;input type&#x3D;&quot;button&quot; value&#x3D;&quot;发送&quot; ref&#x3D;&#123;this.btnRef&#125; onClick&#x3D;&#123;this.onSendMsg&#125; &#x2F;&gt;</span><br><span class="line">        &lt;input type&#x3D;&quot;text&quot; ref&#x3D;&#123;this.msgRef&#125; &#x2F;&gt;</span><br><span class="line">      &lt;&#x2F;div&gt;</span><br><span class="line">    )</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
